name: Build Signed WDA IPA

on:
  workflow_dispatch:
    inputs:
      wda_bundle_id:
        description: 'WDA Bundle ID'
        required: true
        default: 'app.honey4212.crystal5671'
        type: string
      team_id:
        description: 'Apple Developer Team ID'
        required: true
        default: '8R6WK6QAKF'
        type: string
      profile_name:
        description: 'Provisioning Profile Name'
        required: true
        default: '00008030-0001598021E2802E3SL5LO'
        type: string

jobs:
  build:
    name: Build Signed WDA IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Install Certificate and Profile
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -x
          
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PWD="tempkeychain123"
          
          security create-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH || true
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          
          CERT_PATH=$RUNNER_TEMP/cert.p12
          
          # Decode certificate
          echo "$CERT_BASE64" | tr -d '\r\n' | base64 --decode > $CERT_PATH
          
          echo "Certificate file size: $(wc -c < $CERT_PATH) bytes"
          
          # Convert to PEM format and back to PKCS12 to ensure compatibility
          CERT_PEM=$RUNNER_TEMP/cert.pem
          KEY_PEM=$RUNNER_TEMP/key.pem
          P12_NEW=$RUNNER_TEMP/cert_new.p12
          
          # Extract certificate
          openssl pkcs12 -in $CERT_PATH -clcerts -nokeys -passin pass:"$CERT_PASSWORD" -out $CERT_PEM || true
          
          # Extract private key
          openssl pkcs12 -in $CERT_PATH -nocerts -nodes -passin pass:"$CERT_PASSWORD" -out $KEY_PEM || true
          
          # Create new PKCS12 file
          openssl pkcs12 -export -out $P12_NEW -inkey $KEY_PEM -in $CERT_PEM -passout pass:"$CERT_PASSWORD" || true
          
          # Try importing the new PKCS12
          security import $P12_NEW \
            -P "$CERT_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k $KEYCHAIN_PATH \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign \
            -T /usr/bin/security
          
          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          
          PROFILE_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILE_DIR"
          
          # Decode profile and extract UUID for filename
          PROFILE_TEMP=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROFILE_BASE64" | tr -d '\r\n' | base64 --decode > $PROFILE_TEMP
          
          # Extract UUID from profile using security command
          PROFILE_UUID=$(security cms -D -i $PROFILE_TEMP 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || echo "73290ad3-7cc8-4e4f-9d2c-a8a20052fc8d")
          echo "Profile UUID: $PROFILE_UUID"
          
          # Install profile with UUID as filename
          cp $PROFILE_TEMP "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
          
          echo "Profile file size: $(wc -c < "$PROFILE_DIR/$PROFILE_UUID.mobileprovision") bytes"
          
          # List installed profiles
          ls -la "$PROFILE_DIR/"

      - name: Update Bundle ID
        run: |
          BUNDLE_ID="${{ inputs.wda_bundle_id }}"
          
          # Update project.pbxproj - replace all bundle identifiers
          sed -i '' "s/com.facebook.WebDriverAgentRunner/${BUNDLE_ID}/g" WebDriverAgent.xcodeproj/project.pbxproj
          sed -i '' "s/com.facebook.WebDriverAgentLib/${BUNDLE_ID}Lib/g" WebDriverAgent.xcodeproj/project.pbxproj
          
          # Update Info.plist files
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${BUNDLE_ID}Lib" WebDriverAgentLib/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${BUNDLE_ID}" WebDriverAgentRunner/Info.plist
          
          # Add ProvisioningStyle = Manual for WebDriverAgentRunner target (EEF988291C486603005CA669)
          sed -i '' 's/EEF988291C486603005CA669 = {/EEF988291C486603005CA669 = {\
            ProvisioningStyle = Manual;/g' WebDriverAgent.xcodeproj/project.pbxproj

      - name: Build WDA
        id: build
        run: |
          set -o pipefail
          set -x
          
          # Build unsigned first
          xcodebuild -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath wda_build \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log
          
          # Find the .app
          APP_PATH=$(find wda_build -name "*.app" -type d | head -1)
          echo "Found app: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
          
          # Get profile UUID
          PROFILE_UUID=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/ | head -1 | sed 's/.mobileprovision//')
          echo "Profile UUID: $PROFILE_UUID"
          
          # Copy provisioning profile into app
          cp ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision "$APP_PATH/embedded.mobileprovision"
          
          # Check if entitlements file exists
          ls -la WebDriverAgentRunner/
          
          # Create entitlements file - MUST have get-task-allow=true for WDA
          ENTITLEMENTS_PATH=$RUNNER_TEMP/entitlements.plist
          cat > $ENTITLEMENTS_PATH << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>application-identifier</key>
    <string>${{ inputs.team_id }}.${{ inputs.wda_bundle_id }}</string>
    <key>com.apple.developer.team-identifier</key>
    <string>${{ inputs.team_id }}</string>
    <key>get-task-allow</key>
    <true/>
    <key>keychain-access-groups</key>
    <array>
        <string>${{ inputs.team_id }}.${{ inputs.wda_bundle_id }}</string>
    </array>
</dict>
</plist>
EOF
          
          echo "Created entitlements file:"
          cat $ENTITLEMENTS_PATH
          
          # Sign the app with codesign
          codesign --force --sign "iPhone Distribution" \
            --entitlements $ENTITLEMENTS_PATH \
            --timestamp \
            --deep \
            "$APP_PATH"
          
          echo "Signing completed"
          codesign -dv "$APP_PATH" 2>&1 || true

      - name: Create IPA
        run: |
          APP_PATH=$(find wda_build -name "*.app" -type d | head -1)
          echo "Found app: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "No .app found!"
            exit 1
          fi
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r WebDriverAgent.ipa Payload
          ls -lh WebDriverAgent.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-Signed
          path: WebDriverAgent.ipa
          retention-days: 7

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 1

      - name: Cleanup
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
