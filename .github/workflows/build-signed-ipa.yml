name: Build Signed WDA IPA

on:
  workflow_dispatch:
    inputs:
      wda_bundle_id:
        description: 'WDA Bundle ID'
        required: false
        default: 'app.honey4212.crystal5671'
      team_id:
        description: 'Apple Developer Team ID'
        required: false
        default: '8R6WK6QAKF'
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-signed-ipa.yml'
      - 'WebDriverAgentRunner/**'

jobs:
  build:
    name: Build Signed WDA IPA
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Verify Project Configuration
        run: |
          echo "=== Checking WebDriverAgentRunner target type ==="
          grep -A2 "WebDriverAgentRunner \*/" WebDriverAgent.xcodeproj/project.pbxproj | grep productType || true
          echo "=== Checking Info.plist ==="
          cat WebDriverAgentRunner/Info.plist
          echo "=== Checking main.m ==="
          cat WebDriverAgentRunner/main.m
          echo "=== Checking FBWDAAppDelegate.m exists ==="
          ls -la WebDriverAgentRunner/FBWDAAppDelegate.m
          echo "=== Checking scheme ==="
          cat WebDriverAgent.xcodeproj/xcshareddata/xcschemes/WebDriverAgentRunner.xcscheme | grep -E "BuildableName|TestAction" || true

      - name: Install Certificate and Profile
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -x
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PWD="tempkeychain123"
          security create-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH || true
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          CERT_PATH=$RUNNER_TEMP/cert.p12
          echo "$CERT_BASE64" | tr -d '\r\n' | base64 --decode > $CERT_PATH
          echo "Certificate file size: $(wc -c < $CERT_PATH) bytes"
          CERT_PEM=$RUNNER_TEMP/cert.pem
          KEY_PEM=$RUNNER_TEMP/key.pem
          P12_NEW=$RUNNER_TEMP/cert_new.p12
          openssl pkcs12 -in $CERT_PATH -clcerts -nokeys -passin pass:"$CERT_PASSWORD" -out $CERT_PEM || true
          openssl pkcs12 -in $CERT_PATH -nocerts -nodes -passin pass:"$CERT_PASSWORD" -out $KEY_PEM || true
          openssl pkcs12 -export -out $P12_NEW -inkey $KEY_PEM -in $CERT_PEM -passout pass:"$CERT_PASSWORD" || true
          security import $P12_NEW -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security
          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          PROFILE_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILE_DIR"
          PROFILE_TEMP=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROFILE_BASE64" | tr -d '\r\n' | base64 --decode > $PROFILE_TEMP
          PROFILE_UUID=$(security cms -D -i $PROFILE_TEMP 2>/dev/null | plutil -extract UUID raw -)
          echo "Profile UUID: $PROFILE_UUID"
          cp $PROFILE_TEMP "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
          ls -la "$PROFILE_DIR/"

      - name: Update Bundle ID
        run: |
          BUNDLE_ID="${{ github.event.inputs.wda_bundle_id || 'app.honey4212.crystal5671' }}"
          echo "Updating bundle ID to: $BUNDLE_ID"
          sed -i '' "s/com.facebook.WebDriverAgentRunner/$BUNDLE_ID/g" WebDriverAgent.xcodeproj/project.pbxproj
          sed -i '' "s/com.facebook.WebDriverAgentLib/${BUNDLE_ID}Lib/g" WebDriverAgent.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${BUNDLE_ID}Lib" WebDriverAgentLib/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${BUNDLE_ID}" WebDriverAgentRunner/Info.plist

      - name: Build WDA
        id: build
        run: |
          set -o pipefail
          set -x
          xcodebuild -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build_out \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log
          echo "Searching for .app bundle..."
          find build_out -name "*.app" -type d
          APP_PATH=$(find build_out -name "*.app" -type d | grep -v "IntegrationApp" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in build_out"
            cat build.log | tail -200
            exit 1
          fi
          echo "Found app: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
          echo "App contents:"
          ls -la "$APP_PATH/"
          echo "Frameworks:"
          ls -la "$APP_PATH/Frameworks/" 2>/dev/null || echo "No Frameworks directory"
          echo "Executable:"
          file "$APP_PATH/WebDriverAgentRunner" 2>/dev/null || true
          echo "Checking for FBWDAAppDelegate symbol:"
          nm "$APP_PATH/WebDriverAgentRunner" 2>/dev/null | grep -i "FBWDAAppDelegate" || echo "No FBWDAAppDelegate symbol found"
          echo "Checking for main symbol:"
          nm "$APP_PATH/WebDriverAgentRunner" 2>/dev/null | grep -i " _main$" || echo "No main symbol found"

      - name: Embed Provisioning Profile
        run: |
          APP_PATH="${{ steps.build.outputs.APP_PATH }}"
          PROFILE_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_FILE=$(ls "$PROFILE_DIR"/*.mobileprovision 2>/dev/null | head -1)
          if [ -n "$PROFILE_FILE" ]; then
            echo "Copying profile: $PROFILE_FILE"
            cp "$PROFILE_FILE" "$APP_PATH/embedded.mobileprovision"
          else
            echo "WARNING: No provisioning profile found in Profiles directory"
          fi

      - name: Create Entitlements Plist
        run: |
          set -x
          TEAM_ID="${{ github.event.inputs.team_id || '8R6WK6QAKF' }}"
          BUNDLE_ID="${{ github.event.inputs.wda_bundle_id || 'app.honey4212.crystal5671' }}"
          ENTITLEMENTS_PATH=$RUNNER_TEMP/entitlements.plist
          /usr/libexec/PlistBuddy -c "Add :application-identifier string ${TEAM_ID}.${BUNDLE_ID}" $ENTITLEMENTS_PATH
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.team-identifier string ${TEAM_ID}" $ENTITLEMENTS_PATH
          /usr/libexec/PlistBuddy -c "Add :get-task-allow bool true" $ENTITLEMENTS_PATH
          /usr/libexec/PlistBuddy -c "Add :keychain-access-groups array" $ENTITLEMENTS_PATH
          /usr/libexec/PlistBuddy -c "Add :keychain-access-groups:0 string ${TEAM_ID}.${BUNDLE_ID}" $ENTITLEMENTS_PATH
          echo "Entitlements content:"
          cat $ENTITLEMENTS_PATH

      - name: Sign App
        run: |
          set -x
          APP_PATH="${{ steps.build.outputs.APP_PATH }}"
          ENTITLEMENTS_PATH=$RUNNER_TEMP/entitlements.plist
          echo "Signing frameworks first..."
          for framework in "$APP_PATH/Frameworks/"*.framework; do
            if [ -d "$framework" ]; then
              echo "Signing: $framework"
              codesign --force --sign "iPhone Distribution" --timestamp "$framework"
            fi
          done
          echo "Signing app..."
          codesign --force --sign "iPhone Distribution" --entitlements $ENTITLEMENTS_PATH --timestamp "$APP_PATH"
          echo "Signing completed"
          codesign -dv "$APP_PATH" 2>&1 || true

      - name: Create IPA
        run: |
          APP_PATH="${{ steps.build.outputs.APP_PATH }}"
          if [ -z "$APP_PATH" ]; then
            echo "No .app path available!"; exit 1; fi
          rm -rf Payload
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r WebDriverAgent.ipa Payload
          ls -lh WebDriverAgent.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-Signed
          path: WebDriverAgent.ipa
          retention-days: 7

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 1

      - name: Cleanup
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
