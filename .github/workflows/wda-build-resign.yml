name: WDA Build and Resign

on:
  workflow_dispatch:
    inputs:
      identity:
        description: "Signing identity (e.g. iPhone Distribution: Name (TEAMID))"
        required: true
        type: string
      build_only:
        description: "Only build (skip resign)"
        required: false
        type: boolean
        default: false

env:
  XCODE_VERSION: 16.4

jobs:
  build_and_resign:
    name: Build and Resign WDA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "${{ env.XCODE_VERSION }}"

      - name: Setup EC extensions
        run: |
          gem install xcodeproj
          ruby Scripts/ci/setup-ec-extensions.rb

      - name: Build WDA (unsigned)
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO ARCHS=arm64 \
            -derivedDataPath wda_build

      - name: Package unsigned app
        run: |
          cd wda_build/Build/Products/Debug-iphoneos
          zip -r WebDriverAgentRunner-unsigned.zip WebDriverAgentRunner.app \
            -x "WebDriverAgentRunner.app/Frameworks/XC*.framework*" \
               "WebDriverAgentRunner.app/Frameworks/Testing.framework*" \
               "WebDriverAgentRunner.app/Frameworks/libXCTestSwiftSupport.dylib"

      - name: Upload unsigned artifact
        if: inputs.build_only == true
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-unsigned
          path: wda_build/Build/Products/Debug-iphoneos/WebDriverAgentRunner-unsigned.zip

      - name: Decode signing materials
        if: inputs.build_only != true
        run: |
          echo "== Decoding certificate =="
          echo "${{ secrets.WDA_P12_CERTIFICATE }}" | base64 -d > /tmp/cert.p12

          echo "== Decoding provisioning profile =="
          echo "${{ secrets.WDA_PROVISIONING_PROFILE }}" | base64 -d > /tmp/profile.mobileprovision

          echo "== Creating entitlements =="
          cat > /tmp/entitlements.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.get-task-allow</key>
              <true/>
              <key>platform-application</key>
              <true/>
              <key>task_for_pid-allow</key>
              <true/>
              <key>run-unsigned-code</key>
              <true/>
              <key>com.apple.private.MobileGestalt.AllowedDeviceVectors</key>
              <true/>
              <key>com.apple.developer.networking.wifi-info</key>
              <true/>
              <key>keychain-access-groups</key>
              <array>
                  <string>$(AppIdentifierPrefix)$(CFBundleIdentifier)</string>
              </array>
          </dict>
          </plist>
          PLISTEOF

          echo "== Extracting bundle ID from profile =="
          SECURITY cms -D -i /tmp/profile.mobileprovision 2>/dev/null | \
            plutil -extract Entitlements.application-identifier raw -o /tmp/bundle_id_raw - || true
          if [ -f /tmp/bundle_id_raw ]; then
            FULL_ID=$(cat /tmp/bundle_id_raw)
            echo "  Full app ID: $FULL_ID"
          fi

      - name: Import certificate
        if: inputs.build_only != true
        run: |
          # Create temp keychain
          KEYCHAIN_PATH="/tmp/sign.keychain-db"
          KEYCHAIN_PW="ci_temp_$(date +%s)"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"

          # Import p12
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.WDA_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partitions-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          # Verify identity available
          echo "== Available signing identities =="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Resign IPA
        if: inputs.build_only != true
        run: |
          IDENTITY="${{ inputs.identity }}"
          APP_DIR="wda_build/Build/Products/Debug-iphoneos/WebDriverAgentRunner.app"

          echo "== Resigning WebDriverAgent IPA =="
          echo "  Identity: $IDENTITY"
          echo "  App: $APP_DIR"

          # 1. Remove old signatures
          echo "[1/4] Removing old signatures..."
          find "$APP_DIR" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true

          # 2. Embed provisioning profile
          echo "[2/4] Embedding provisioning profile..."
          cp /tmp/profile.mobileprovision "$APP_DIR/embedded.mobileprovision"

          # 3. Resign frameworks (reverse dependency order)
          echo "[3/4] Resigning frameworks..."
          FRAMEWORKS_DIR="$APP_DIR/Frameworks"
          if [ -d "$FRAMEWORKS_DIR" ]; then
            for framework in "$FRAMEWORKS_DIR"/*.framework; do
              if [ -d "$framework" ]; then
                echo "  Resigning: $(basename "$framework")"
                find "$framework" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
                codesign --force --sign "$IDENTITY" \
                  --timestamp=none \
                  --keychain /tmp/sign.keychain-db \
                  "$framework"
              fi
            done
          fi

          # 4. Resign main app with entitlements
          echo "[4/4] Resigning main app..."
          codesign --force --sign "$IDENTITY" \
            --entitlements /tmp/entitlements.plist \
            --timestamp=none \
            --keychain /tmp/sign.keychain-db \
            --deep \
            "$APP_DIR"

          # Verify
          echo ""
          echo "== Verification =="
          codesign -dvv "$APP_DIR" 2>&1 | head -30

          # Package IPA
          echo ""
          echo "== Packaging IPA =="
          mkdir -p Payload
          cp -r "$APP_DIR" Payload/
          zip -qr tj-easyclick-agent.ipa Payload
          echo "IPA created: $(ls -lh tj-easyclick-agent.ipa)"

      - name: Upload resigned IPA
        if: inputs.build_only != true
        uses: actions/upload-artifact@v4
        with:
          name: tj-easyclick-agent
          path: tj-easyclick-agent.ipa

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain /tmp/sign.keychain-db 2>/dev/null || true
          rm -f /tmp/cert.p12 /tmp/profile.mobileprovision /tmp/entitlements.plist
