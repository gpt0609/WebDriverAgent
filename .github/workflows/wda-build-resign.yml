name: WDA Build and Resign

on:
  workflow_dispatch:
    inputs:
      identity:
        description: "Signing identity (e.g. iPhone Distribution: Name (TEAMID))"
        required: true
        type: string
      build_only:
        description: "Only build (skip resign)"
        required: false
        type: boolean
        default: false

env:
  XCODE_VERSION: 16.4

jobs:
  build_and_resign:
    name: Build and Resign WDA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "${{ env.XCODE_VERSION }}"

      - name: Build WDA (unsigned)
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO ARCHS=arm64 \
            -derivedDataPath wda_build

      - name: Package unsigned app
        run: |
          cd wda_build/Build/Products/Debug-iphoneos
          zip -r WebDriverAgentRunner-unsigned.zip WebDriverAgentRunner.app \
            -x "WebDriverAgentRunner.app/Frameworks/XC*.framework*" \
               "WebDriverAgentRunner.app/Frameworks/Testing.framework*" \
               "WebDriverAgentRunner.app/Frameworks/libXCTestSwiftSupport.dylib"

      - name: Upload unsigned artifact
        if: inputs.build_only == true
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-unsigned
          path: wda_build/Build/Products/Debug-iphoneos/WebDriverAgentRunner-unsigned.zip

      - name: Decode signing materials
        if: inputs.build_only != true
        run: |
          echo "== Decoding certificate =="
          printf '%s' "${{ secrets.WDA_P12_CERTIFICATE }}" | base64 -d > /tmp/cert.p12
          echo "  P12 file size: $(wc -c < /tmp/cert.p12) bytes"

          echo "== Decoding provisioning profile =="
          printf '%s' "${{ secrets.WDA_PROVISIONING_PROFILE }}" | base64 -d > /tmp/profile.mobileprovision
          echo "  Profile file size: $(wc -c < /tmp/profile.mobileprovision) bytes"

          echo "== Verifying p12 password =="
          PASSWORD="${{ secrets.WDA_P12_PASSWORD }}"
          echo "  Password length: ${#PASSWORD}"

          echo "== Creating entitlements =="
          cat > /tmp/entitlements.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.get-task-allow</key>
              <true/>
              <key>platform-application</key>
              <true/>
              <key>task_for_pid-allow</key>
              <true/>
              <key>run-unsigned-code</key>
              <true/>
              <key>com.apple.private.MobileGestalt.AllowedDeviceVectors</key>
              <true/>
              <key>com.apple.developer.networking.wifi-info</key>
              <true/>
              <key>keychain-access-groups</key>
              <array>
                  <string>$(AppIdentifierPrefix)$(CFBundleIdentifier)</string>
              </array>
          </dict>
          </plist>
          PLISTEOF

          echo "== Extracting bundle ID from profile =="
          SECURITY cms -D -i /tmp/profile.mobileprovision 2>/dev/null | \
            plutil -extract Entitlements.application-identifier raw -o /tmp/bundle_id_raw - || true
          if [ -f /tmp/bundle_id_raw ]; then
            FULL_ID=$(cat /tmp/bundle_id_raw)
            echo "  Full app ID: $FULL_ID"
          fi

      - name: Import certificate
        if: inputs.build_only != true
        run: |
          PASSWORD="${{ secrets.WDA_P12_PASSWORD }}"
          KEYCHAIN_PATH="/tmp/sign.keychain-db"
          KEYCHAIN_PW="ci_temp_$(date +%s)"

          echo "== Creating keychain =="
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"

          echo "== Adding keychain to search list =="
          # CRITICAL: Add custom keychain to the search list so codesign can find it
          security list-keychains -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "== Importing certificate =="
          set +e
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          IMPORT_EXIT=$?
          set -e
          echo "  Import exit code: $IMPORT_EXIT"

          echo "== Setting key partitions =="
          # set-key-partitions-list may fail on some macOS versions, tolerate it
          security set-key-partitions-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH" 2>/dev/null || \
            echo "  (set-key-partitions-list not available, continuing without partition ACL)"

          echo "== Verifying keychain search list =="
          security list-keychains

          echo "== Available signing identities =="
          security find-identity -v -p codesigning

          echo "== Identities in custom keychain =="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          IDENTITY_COUNT=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -c "1)")
          if [ "$IDENTITY_COUNT" -eq 0 ]; then
            echo "[FAIL] No signing identities found in keychain! Cannot proceed."
            exit 1
          fi

      - name: Resign IPA
        if: inputs.build_only != true
        run: |
          IDENTITY="${{ inputs.identity }}"
          APP_DIR="wda_build/Build/Products/Debug-iphoneos/WebDriverAgentRunner.app"

          echo "== Resigning WebDriverAgent IPA =="
          echo "  Identity: $IDENTITY"
          echo "  App: $APP_DIR"

          # 0. Remove old signatures
          echo "[0/3] Removing old signatures..."
          find "$APP_DIR" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true

          # 2. Embed provisioning profile
          echo "[1/3] Embedding provisioning profile..."
          cp /tmp/profile.mobileprovision "$APP_DIR/embedded.mobileprovision"

          # 3. Resign frameworks (skip system ones already removed)
          echo "[2/3] Resigning frameworks..."
          if [ -d "$FRAMEWORKS_DIR" ]; then
            for framework in "$FRAMEWORKS_DIR"/*.framework; do
              if [ -d "$framework" ]; then
                echo "  Resigning: $(basename "$framework")"
                find "$framework" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
                codesign --force --sign "$IDENTITY" \
                  --timestamp=none \
                  "$framework"
              fi
            done
            # Also sign any dylibs
            for dylib in "$FRAMEWORKS_DIR"/*.dylib; do
              if [ -f "$dylib" ]; then
                echo "  Resigning: $(basename "$dylib")"
                codesign --force --sign "$IDENTITY" --timestamp=none "$dylib"
              fi
            done
          fi

          # 4. Resign main app with entitlements (no --deep, frameworks already signed)
          echo "[3/3] Resigning main app..."
          codesign --force --sign "$IDENTITY" \
            --entitlements /tmp/entitlements.plist \
            --timestamp=none \
            "$APP_DIR"

          # Verify
          echo ""
          echo "== Verification =="
          codesign -dvv "$APP_DIR" 2>&1 | head -30

          # Package IPA
          echo ""
          echo "== Packaging IPA =="
          mkdir -p Payload
          cp -r "$APP_DIR" Payload/
          zip -qr webdriveragent.ipa Payload
          echo "IPA created: $(ls -lh webdriveragent.ipa)"

      - name: Upload resigned IPA
        if: inputs.build_only != true
        uses: actions/upload-artifact@v4
        with:
          name: webdriveragent
          path: webdriveragent.ipa

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain /tmp/sign.keychain-db 2>/dev/null || true
          rm -f /tmp/cert.p12 /tmp/profile.mobileprovision /tmp/entitlements.plist
